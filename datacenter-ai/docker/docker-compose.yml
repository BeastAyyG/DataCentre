version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: dc-ai-backend
    ports:
      - "8000:8000"
    # Read ALL environment variables from .env at project root
    env_file:
      - ../.env
    environment:
      # Docker-only overrides — these are safe inside containers
      - BACKEND_HOST=0.0.0.0
    volumes:
      - ../ml/artifacts:/app/ml/artifacts:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: dc-ai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: dc-ai-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped


