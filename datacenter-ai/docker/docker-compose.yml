version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dc-ai-postgres
    environment:
      POSTGRES_USER: dcadmin
      POSTGRES_PASSWORD: dcpassword
      POSTGRES_DB: datacenter_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcadmin -d datacenter_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: dc-ai-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - BACKEND_HOST=0.0.0.0
      - DATABASE_URL=postgresql://dcadmin:dcpassword@postgres:5432/datacenter_ai
    volumes:
      - ../ml:/app/ml:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; r=urllib.request.urlopen('http://localhost:8000/api/v1/health'); assert r.status==200"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: dc-ai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: dc-ai-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  tests:
    build:
      context: ..
      dockerfile: tests/Dockerfile
    container_name: dc-ai-tests
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - test

volumes:
  postgres_data:
    driver: local
